app = "decompose-sales-penetration"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8050
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

# Liveness check only. Decompose has no database, so /health returns 200 whenever
# the process is up — it can never 503 for a data reason and pull the machine from
# the proxy (the Spin Rate bug, designed out — see DECISIONS.md).
[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
